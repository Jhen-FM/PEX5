<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Ateliê Garage - Dashboard de Estoque</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <header>
    <h1>📊 Dashboard de Estoque - Ateliê Garage</h1>
  </header>

  <main>
    <section>
      <h2>Itens em Estoque</h2>
      <table>
        <thead>
          <tr><th>Item</th><th>Quantidade</th></tr>
        </thead>
        <tbody id="stock"></tbody>
      </table>
    </section>

    <section>
      <h2>Consumo Mensal</h2>
      <canvas id="consumoChart"></canvas>
    </section>

    <section>
      <h2>Itens Mais Usados</h2>
      <canvas id="topItemsChart"></canvas>
    </section>
  </main>

  <footer>
    <p>© 2026 Ateliê Garage</p>
  </footer>

  <script>
    async function loadStock() {
      const res = await fetch('/api/stock');
      const data = await res.json();
      document.getElementById('stock').innerHTML =
        data.map(s => `<tr><td>${s.name}</td><td>${s.qty}</td></tr>`).join('');
    }

    async function loadIndicators() {
      const res = await fetch('/api/indicators');
      const data = await res.json();

      // Consumo mensal
      new Chart(document.getElementById('consumoChart'), {
        type: 'line',
        data: {
          labels: data.consumoMensal.map(c => c.mes),
          datasets: [{
            label: 'Consumo',
            data: data.consumoMensal.map(c => c.total),
            borderColor: '#ff9800',
            fill: false
          }]
        }
      });

      // Itens mais usados
      new Chart(document.getElementById('topItemsChart'), {
        type: 'bar',
        data: {
          labels: data.topItems.map(i => i.name),
          datasets: [{
            label: 'Quantidade usada',
            data: data.topItems.map(i => i.total),
            backgroundColor: '#ff9800'
          }]
        }
      });
    }

    loadStock();
    loadIndicators();
  </script>
</body>
</html>
